<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskForce App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --blue: #007aff;
            --red: #ff3b30;
            --green: #34c759;
            --text: #1c1c1e;
            --gray: #8e8e93;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--text);
            -webkit-user-select: none; /* テキスト選択を禁止してアプリ感を出す */
        }

        .header {
            margin-bottom: 30px;
            padding-left: 5px;
        }
        .header h1 { font-size: 32px; font-weight: 800; margin: 0; }
        .header p { color: var(--gray); margin-top: 5px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* ボタンデザイン */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 15px;
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }

        /* カウンター表示 */
        .counter-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .count-num { font-size: 24px; font-weight: 700; color: var(--blue); }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="date-display">0月0日</h1>
        <p>自分だけの最強習慣管理</p>
    </div>

    <div class="card">
        <span class="card-label">Control</span>
        
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック開始&x-success=webapp://" class="btn btn-red">
            集中モード開始
        </a>

        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック解除&x-success=webapp://" class="btn btn-green" onclick="addCount()">
            タスク完了 & 解除
        </a>
    </div>

    <div class="card">
        <span class="card-label">Daily Progress</span>
        <div class="counter-box">
            <span>今日のクリア数</span>
            <span class="count-num" id="count-display">0</span>
        </div>
    </div>

    <script>
        // 日付の更新
        const now = new Date();
        document.getElementById('date-display').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日";

        // カウントの読み込みと表示
        let count = parseInt(localStorage.getItem('myAppCount')) || 0;
        document.getElementById('count-display').innerText = count;

        function addCount() {
            count++;
            localStorage.setItem('myAppCount', count);
            document.getElementById('count-display').innerText = count;
        }
    </script>
</body>
</html>
