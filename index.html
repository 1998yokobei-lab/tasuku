<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My TaskForce</title>
    <style>
        /* アプリっぽいデザインにするための設定 */
        body { font-family: -apple-system, sans-serif; background-color: #f2f2f7; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #1c1c1e; font-size: 24px; }
        
        /* ボタンのデザイン */
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold;
            cursor: pointer; text-decoration: none; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        
        .start-btn { background-color: #ff3b30; color: white; } /* ロック開始（赤） */
        .done-btn { background-color: #34c759; color: white; }  /* 完了・解除（緑） */
        
        .status { font-size: 14px; color: #8e8e93; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>習慣マネージャー</h1>
        <p class="status">今の状態：準備完了</p>
    </div>

    <div class="card">
        <h3>これから集中する</h3>
        <a href="shortcuts://run-shortcut?name=ロック開始" class="btn start-btn">集中モード ON</a>
    </div>

    <div class="card">
        <h3>タスク完了報告</h3>
        <a href="shortcuts://run-shortcut?name=ロック解除" class="btn done-btn">ピアノ完了！解除</a>
        <a href="shortcuts://run-shortcut?name=ロック解除" class="btn done-btn" style="background-color: #007aff;">勉強完了！解除</a>
    </div>

    <script>
        // ここに「何回クリアしたか」などの記録機能を後で追加できるよ！
    </script>
</body>
</html>
