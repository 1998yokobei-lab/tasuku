<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskForce Custom</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --blue: #007aff;
            --red: #ff3b30;
            --green: #34c759;
            --text: #1c1c1e;
            --gray: #8e8e93;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 40px 20px; color: var(--text); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* タイマー部分 */
        .timer-card { background: #1c1c1e; color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .timer-display { font-size: 42px; font-weight: 800; }

        /* 設定入力部分 */
        .settings { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        input[type="number"] { width: 60px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 18px; text-align: center; }

        .btn { display: flex; align-items: center; justify-content: center; height: 55px; border-radius: 15px; font-size: 17px; font-weight: 600; text-decoration: none; margin-bottom: 12px; transition: 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-save { background: var(--blue); color: white; height: 40px; padding: 0 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="timer-card">
        <div style="font-size: 13px; opacity: 0.7;">自動ロックまで</div>
        <div class="timer-display" id="countdown">--:--:--</div>
        
        <div class="settings">
            <input type="number" id="targetHourInput" min="0" max="23" placeholder="22">
            <span>時</span>
            <button class="btn btn-save" onclick="saveTargetHour()">設定保存</button>
        </div>
    </div>

    <div class="card">
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック開始&x-success=webapp://" class="btn btn-red">集中モード開始</a>
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック解除&x-success=webapp://" class="btn btn-green" onclick="addCount()">タスク完了 & 解除</a>
    </div>

    <div class="card" style="text-align: center;">
        <span style="color: var(--gray); font-size: 14px;">今日のクリア数</span>
        <div style="font-size: 32px; font-weight: 800; color: var(--blue);" id="count-display">0</div>
    </div>

    <script>
        // 保存された時間を読み込む（なければ22時）
        let targetHour = localStorage.getItem('targetHour') || 22;
        document.getElementById('targetHourInput').value = targetHour;

        function saveTargetHour() {
            const h = document.getElementById('targetHourInput').value;
            if (h >= 0 && h <= 23) {
                targetHour = h;
                localStorage.setItem('targetHour', h);
                alert("ロック時間を " + h + " 時に設定したよ！\n※オートメーション側の時間も合わせてね！");
            }
        }

        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(targetHour, 0, 0, 0);

            if (now > target) target.setDate(target.getDate() + 1);

            const diff = target - now;
            const h = Math.floor(diff / 1000 / 60 / 60);
            const m = Math.floor(diff / 1000 / 60) % 60;
            const s = Math.floor(diff / 1000) % 60;

            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // カウント機能
        let count = parseInt(localStorage.getItem('myAppCount')) || 0;
        document.getElementById('count-display').innerText = count;
        function addCount() {
            count++;
            localStorage.setItem('myAppCount', count);
            document.getElementById('count-display').innerText = count;
        }
    </script>
</body>
</html>
