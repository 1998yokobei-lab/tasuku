<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My TaskForce</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --blue: #007aff;
            --red: #ff3b30;
            --green: #34c759;
            --text: #1c1c1e;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 15px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }

        .btn-start { background: var(--red); color: white; }
        .btn-done { background: var(--green); color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="date">アプリ</h1>
        
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック開始&x-success=ここに自分のURLを入れる" class="btn btn-start">
            集中モード開始
        </a>

        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック解除&x-success=ここに自分のURLを入れる" class="btn btn-done" onclick="completeTask()">
            タスク完了 & 解除
        </a>

    </div>

    <div class="card">
        <p id="status">今日のクリア数: 0</p>
    </div>

    <script>
        // 今日の日付を出す
        const d = new Date();
        document.getElementById('date').innerText = (d.getMonth()+1) + "月" + d.getDate() + "日";

        // カウント機能
        let count = localStorage.getItem('count') || 0;
        document.getElementById('status').innerText = "今日のクリア数: " + count;

        function completeTask() {
            count++;
            localStorage.setItem('count', count);
            document.getElementById('status').innerText = "今日のクリア数: " + count;
        }
    </script>
</body>
</html>
