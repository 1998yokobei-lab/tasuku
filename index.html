<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskForce Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --blue: #007aff;
            --red: #ff3b30;
            --green: #34c759;
            --text: #1c1c1e;
            --gray: #8e8e93;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 40px 20px; color: var(--text); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .timer-card { background: #1c1c1e; color: white; border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; text-align: center; }
        .timer-display { font-size: 48px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; }

        /* 時刻設定エリア */
        .settings { margin-top: 15px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
        .settings label { display: block; font-size: 12px; margin-bottom: 8px; opacity: 0.8; }
        input[type="time"] { 
            background: white; border: none; padding: 10px; border-radius: 10px; 
            font-size: 20px; font-weight: bold; font-family: inherit; margin-bottom: 10px; width: 120px;
        }

        .btn { display: flex; align-items: center; justify-content: center; height: 55px; border-radius: 15px; font-size: 17px; font-weight: 600; text-decoration: none; margin-bottom: 12px; transition: 0.1s; border: none; width: 100%; }
        .btn:active { transform: scale(0.96); }
        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-save { background: var(--blue); color: white; height: 45px; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="timer-card">
        <div style="font-size: 14px; opacity: 0.7; margin-bottom: 5px;">自動ロックまで</div>
        <div class="timer-display" id="countdown">00:00:00</div>
        
        <div class="settings">
            <label>ロックされる時間を設定</label>
            <input type="time" id="targetTimeInput">
            <button class="btn btn-save" onclick="saveTargetTime()">設定を保存して連動</button>
        </div>
    </div>

    <div class="card">
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック開始&x-success=webapp://" class="btn btn-red">今すぐロック開始</a>
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック解除&x-success=webapp://" class="btn btn-green" onclick="addCount()">タスク完了 & 解除</a>
    </div>

    <div class="card" style="text-align: center;">
        <span style="color: var(--gray); font-size: 14px;">今日のクリア数</span>
        <div style="font-size: 32px; font-weight: 800; color: var(--blue);" id="count-display">0</div>
    </div>

    <script>
        // 保存された「時:分」を読み込む（なければ22:00）
        let targetTime = localStorage.getItem('targetTime') || "22:00";
        document.getElementById('targetTimeInput').value = targetTime;

        function saveTargetTime() {
            const t = document.getElementById('targetTimeInput').value;
            if (t) {
                targetTime = t;
                localStorage.setItem('targetTime', t);
                alert("設定完了！\nショートカットのオートメーションも「" + t + "」に変えておいてね！");
            }
        }

        function updateTimer() {
            const now = new Date();
            const [tHour, tMin] = targetTime.split(':');
            
            let target = new Date();
            target.setHours(parseInt(tHour), parseInt(tMin), 0, 0);

            // 設定時間を過ぎていたら翌日に設定
            if (now > target) {
                target.setDate(target.getDate() + 1);
            }

            const diff = target - now;
            const h = Math.floor(diff / 1000 / 60 / 60);
            const m = Math.floor(diff / 1000 / 60) % 60;
            const s = Math.floor(diff / 1000) % 60;

            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // クリア数カウント機能
        let count = parseInt(localStorage.getItem('myAppCount')) || 0;
        document.getElementById('count-display').innerText = count;
        function addCount() {
            count++;
            localStorage.setItem('myAppCount', count);
            document.getElementById('count-display').innerText = count;
        }
    </script>
</body>
</html>
