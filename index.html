<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskForce Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --blue: #007aff;
            --red: #ff3b30;
            --green: #34c759;
            --text: #1c1c1e;
            --gray: #8e8e93;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--text);
        }

        .header { margin-bottom: 25px; }
        .header h1 { font-size: 32px; font-weight: 800; margin: 0; }
        
        /* カウントダウンのカード */
        .timer-card {
            background: linear-gradient(135deg, #1c1c1e, #3a3a3c);
            color: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .timer-display { font-size: 42px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .timer-label { font-size: 13px; opacity: 0.7; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn {
            display: flex; align-items: center; justify-content: center;
            height: 60px; border-radius: 16px; font-size: 18px; font-weight: 600;
            text-decoration: none; margin-bottom: 15px; transition: 0.1s;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="date-display">0月0日</h1>
    </div>

    <div class="timer-card">
        <div class="timer-label">自動ロックまであと</div>
        <div class="timer-display" id="countdown">--:--:--</div>
    </div>

    <div class="card">
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック開始&x-success=webapp://" class="btn btn-red">
            今すぐロック開始
        </a>

        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック解除&x-success=webapp://" class="btn btn-green" onclick="addCount()">
            タスク完了 & 解除
        </a>
    </div>

    <div class="card" style="text-align: center;">
        <span style="color: var(--gray); font-size: 14px;">今日のクリア数</span>
        <div style="font-size: 32px; font-weight: 800; color: var(--blue);" id="count-display">0</div>
    </div>

    <script>
        // 設定：何時に自動ロックするか（22なら夜10時）
        const targetHour = 22;

        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(targetHour, 0, 0, 0);

            // もし設定時間を過ぎていたら、明日のその時間にセット
            if (now > target) {
                target.setDate(target.getDate() + 1);
            }

            const diff = target - now;
            const h = Math.floor(diff / 1000 / 60 / 60);
            const m = Math.floor(diff / 1000 / 60) % 60;
            const s = Math.floor(diff / 1000) % 60;

            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 1秒ごとに更新
        setInterval(updateTimer, 1000);
        updateTimer();

        // 日付表示
        document.getElementById('date-display').innerText = (now.getMonth() + 1) + "月" + now.getDate() + "日";

        // カウント機能
        let count = parseInt(localStorage.getItem('myAppCount')) || 0;
        document.getElementById('count-display').innerText = count;

        function addCount() {
            count++;
            localStorage.setItem('myAppCount', count);
            document.getElementById('count-display').innerText = count;
        }
    </script>
</body>
</html>
